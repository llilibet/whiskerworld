<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Admin - Whiskerworld</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* CSS mínimo específico do dashboard */
    .admin-container { max-width:1200px; margin:40px auto; padding:0 20px; }
    .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .admin-summary { display:flex; gap:16px; flex-wrap:wrap; }
    .summary-card { background:#f3f7f0; padding:14px 18px; border-radius:12px; box-shadow:0 6px 14px rgba(0,0,0,.06); }
    .admin-main { display:grid; grid-template-columns: 1fr 420px; gap:24px; align-items:start; }
    .panel { background:#fff; padding:18px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.06); }
    .panel h2 { margin:0 0 12px 0; font-size:20px; }
    .animals-list { display:flex; gap:12px; flex-wrap:wrap; }
    .animal-admin-card { width:160px; background:#fef6d5; padding:12px; border-radius:12px; position:relative; }
    .animal-admin-card img { width:100%; height:100px; object-fit:cover; border-radius:8px; display:block; margin-bottom:8px; }
    .animal-admin-actions { display:flex; gap:8px; margin-top:8px; }
    .btn { padding:8px 12px; border-radius:20px; border:none; cursor:pointer; background:#d5e9c8; }
    .btn-danger { background:#ffd6d6; }
    .agendamentos-list { display:flex; flex-direction:column; gap:10px; }
    .agendamento-item { display:flex; justify-content:space-between; gap:12px; padding:10px; border-radius:8px; background:#fbfbfb; }
    .small { font-size:13px; color:#666; }
    .right-controls button { margin-left:6px; }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1>Admin Dashboard</h1>
        <div class="small">Gerencie animais e agendamentos</div>
      </div>
      <div>
        <button id="btn-logout" class="btn">Logout</button>
      </div>
    </div>

    <div class="admin-summary">
      <div class="summary-card"><strong id="total-animais">—</strong><div class="small">Animais</div></div>
      <div class="summary-card"><strong id="total-agendamentos">—</strong><div class="small">Agendamentos</div></div>
    </div>

    <div class="admin-main" style="margin-top:20px;">
      <div class="panel">
        <h2>Animais</h2>
        <div style="margin-bottom:12px;">
          <a href="admin-cadastrar-animal.html" class="btn">Cadastrar novo animal</a>
        </div>
        <div class="animals-list" id="animals-list">
          <!-- cards de animais serão inseridos aqui -->
        </div>
      </div>

      <div class="panel">
        <h2>Agendamentos</h2>
        <div class="agendamentos-list" id="agendamentos-list">
          <!-- lista de agendamentos -->
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
